apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-test-config
  namespace: iot-chirpstack-qa
data:
  mosquitto.conf: |
    listener 1883 0.0.0.0
    allow_anonymous true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto-test-deployment
  namespace: iot-chirpstack-qa
  labels:
    app.kubernetes.io/instance: mosquitto
    app.kubernetes.io/name: quext-chirpstack
    istio-injection: disabled
    sidecar.istio.io/inject: 'false'
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: mosquitto
      app.kubernetes.io/name: quext-chirpstack
  template:
    metadata:
      namespace: iot-chirpstack-qa
      labels:
        app.kubernetes.io/instance: mosquitto
        app.kubernetes.io/name: quext-chirpstack
        istio-injection: disabled
        sidecar.istio.io/inject: 'false'
    spec:
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2.0
          ports:
            - name: mosquitto
              containerPort: 1883
              protocol: TCP
          volumeMounts:
            - name: mosquitto-config
              mountPath: /mosquitto/config
      volumes:
        - name: mosquitto-config
          configMap:
            name: mosquitto-test-config
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: product
                  operator: In
                  values:
                  - chirpstack
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                  - key: app.kubernetes.io/instance
                    operator: In
                    values:
                    - mosquitto
                topologyKey: kubernetes.io/hostname
      tolerations:
      - key: product
        operator: Equal
        value: chirpstack
        effect: NoSchedule
      - key: node.kubernetes.io/not-ready
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 300
      - key: node.kubernetes.io/unreachable
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 300